name: Scan Guild GLs

on:
  workflow_dispatch:
    inputs:
      guildId:
        description: 'Guild ID'
        required: true
        type: string
      guildName:
        description: 'Guild name (for filename)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan GLs
        run: |
          python .github/scripts/scan_gls.py "${{ github.event.inputs.guildId }}"
          mkdir -p /tmp/gl-scan
          cp gl-data.json "/tmp/gl-scan/${{ github.event.inputs.guildName }}.json"

      - name: Setup snapshots branch
        run: |
          git fetch origin snapshots 2>/dev/null || git branch snapshots
          git checkout snapshots 2>/dev/null || git checkout -b snapshots

      - name: Copy and commit
        run: |
          mkdir -p data/gl-scans
          cp "/tmp/gl-scan/${{ github.event.inputs.guildName }}.json" "data/gl-scans/${{ github.event.inputs.guildName }}.json"
          git config user.name "scan-bot"
          git config user.email "bot@swgoh.app"
          git add data/gl-scans
          git diff --cached --quiet || git commit -m "gl-scan: ${{ github.event.inputs.guildName }}"
          git push origin snapshots --force

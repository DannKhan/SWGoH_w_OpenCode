name: Fetch Player Snapshot

on:
  workflow_dispatch:
    inputs:
      allyCode:
        description: 'Player ally code'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup snapshots branch
        run: |
          cd repo
          git fetch origin snapshots 2>/dev/null && git checkout snapshots || {
            git checkout -b snapshots
            git push origin snapshots
          }

      - name: Fetch player data
        run: |
          mkdir -p repo/data/snapshots
          curl -s -X POST "https://free-comlink.onrender.com/player" \
            -H "Content-Type: application/json" \
            -d '{ "payload": { "allyCode": "${{ github.event.inputs.allyCode }}" } }' \
            > repo/data/snapshots/${{ github.event.inputs.allyCode }}.json
          echo "Saved ($(wc -c < repo/data/snapshots/${{ github.event.inputs.allyCode }}.json) bytes)"

      - name: Commit and push
        run: |
          cd repo
          git config user.name "snapshot-bot"
          git config user.email "bot@swgoh.app"
          git add data/snapshots/${{ github.event.inputs.allyCode }}.json
          git commit -m "snapshot: ${{ github.event.inputs.allyCode }}"
          git push origin snapshots --force
